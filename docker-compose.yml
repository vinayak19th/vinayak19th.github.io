services:
    jekyll:
        build:
            context: .
            dockerfile: docker/Dockerfile
        image: vinayak1998th/resume-container
        container_name: resume-run
        command: jekyll serve --verbose 0 --host 0.0.0.0
        ports:
            - 4000:4000
            - 35729:35729
        volumes:
            - ./:/site
