<div class="contact-info-container">
    <div class="card profile-card-rectangular">
        <div class="row">
            <!-- Image Column -->
            <div class="col-md-4 profile-img-container">
                <!-- Circular Profile Picture -->
                <img src="{{site.about_profile_image}}" class="profile-img-circle" alt="Profile Picture">
            </div>
            <!-- Details Column -->
            <div class="col-md-8">
                <div class="card-body d-flex flex-column h-100 p-4">
                    <div class="card-header pb-2">
                        <h2 class="card-title mb-2" style="font-weight: 500;">{{site.name}}</h2>
                        <p class="card-text mb-2" style="font-size:1.5rem"><em>{{site.title}}</em></p>
                    </div>
                    <div class="card-text mt-3">
                        <p class="mb-1">Find me on: </p>    
                    </div>
                    <div class="mt-3">
                        <div class="social-icons d-flex gap-3">
                            {%- if site.email -%}
                            <a href="mailto:{{ site.email | escape }}" title="Email"><i class="fas fa-envelope"></i></a>
                            {%- endif -%}
                            {%- if site.whatsapp_number -%}
                            <a href="https://wa.me/{{ site.whatsapp_number| cgi_escape | escape }}" target="_blank" title="WhatsApp"><i class="bi bi-whatsapp"></i></a>
                            {%- endif -%}
                            {%- if site.linkedin_username -%}
                            <a href="https://www.linkedin.com/in/{{ site.linkedin_username| cgi_escape | escape }}" target="_blank" title="LinkedIn"><i class="bi bi-linkedin"></i></a>
                            {%- endif -%}
                            {%- if site.github_username -%}
                            <a href="https://github.com/{{ site.github_username| cgi_escape | escape }}" target="_blank" title="GitHub"><i class="bi bi-github"></i></a>
                            {%- endif -%}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
